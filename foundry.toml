[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
fallback_oz = true
is_system = false
mode = "3"
optimizer = true
optimizer_runs = 100
via_ir = true
solc = "0.8.28"
gas_limit = "9223372036854775807" # Monte-Carlo sims (test/simulation/) exceed the 2^30 default

fs_permissions = [
    { access = "read-write", path = "script/data" }
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "preserve"
multiline_func_header = "attributes_first"

[rpc_endpoints]
abstract = "https://api.mainnet.abs.xyz"
abstract-testnet = "https://api.testnet.abs.xyz"

[etherscan]
abstract-testnet = { chain = "11124", url = "https://api.etherscan.io/v2/api?chainid=11124", key = "${ETHERSCAN_API_KEY}" }
abstract = { chain = "2741", url = "https://api.etherscan.io/v2/api?chainid=2741", key = "${ETHERSCAN_API_KEY}" }