[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
fallback_oz = true
is_system = false
mode = "3"
optimizer = true
optimizer_runs = 200
via_ir = true
solc = "0.8.28"

[rpc_endpoints]
abstract = "https://api.mainnet.abs.xyz"
abstract-testnet = "https://api.testnet.abs.xyz"

[etherscan]
abstract-testnet = { chain = "11124", url = "https://api.etherscan.io/v2/api?chainid=11124", key = "${ETHERSCAN_API_KEY}" }
abstract = { chain = "2741", url = "https://api.etherscan.io/v2/api?chainid=2741", key = "${ETHERSCAN_API_KEY}" }
