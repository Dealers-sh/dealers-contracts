[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
optimizer = true
optimizer_runs = 200
via_ir = true
solc = "0.8.28"

# Native zkSync compilation profile - skips renderer contracts that use EXTCODECOPY
# Usage: forge build --zksync --skip DealerRenderer
[profile.default.zksync]
fallback_oz = true
optimizer = true
optimizer_mode = "3"
zksolc = "1.5.11"
suppressed_warnings = ["txorigin", "assemblycreate"]

[rpc_endpoints]
abstract = "https://api.mainnet.abs.xyz"
abstract-testnet = "https://api.testnet.abs.xyz"

[etherscan]
abstract-testnet = { chain = "11124", url = "https://api.etherscan.io/v2/api?chainid=11124", key = "${ETHERSCAN_API_KEY}" }
abstract = { chain = "2741", url = "https://api.etherscan.io/v2/api?chainid=2741", key = "${ETHERSCAN_API_KEY}" }
